<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Parent Survey — 90 seconds</title>
<!-- Fonts: system stack — no external dependency, works offline -->
<style>
:root {
  --cream:   #F5F0E8;
  --warm:    #EDE7D8;
  --sage-dk: #4A7050;
  --sage-lt: #C2D8C5;
  --terr:    #C4784A;
  --coal:    #2A2A2A;
  --mist:    #8A9A8E;
  --pearl:   #FDFAF4;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
  background:var(--warm);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:40px 20px 80px;
  -webkit-font-smoothing:antialiased;
}

/* ── HEADER ── */
.brand {
  font-family:'Georgia',serif;
  font-size:26px; font-weight:400;
  color:var(--sage-dk); text-align:center; margin-bottom:5px;
}
.brand em { font-style:italic; color:var(--terr); }
.survey-meta {
  font-size:10.5px; color:var(--mist);
  letter-spacing:2.5px; text-transform:uppercase;
  text-align:center; margin-bottom:30px;
}

/* ── PROGRESS ── */
.progress-wrap { width:100%; max-width:640px; margin-bottom:26px; }
.progress-label {
  display:flex; justify-content:space-between;
  font-size:10.5px; color:var(--mist); margin-bottom:6px; font-weight:500;
}
.progress-bar { width:100%; height:3px; background:rgba(74,112,80,0.12); border-radius:2px; overflow:hidden; }
.progress-fill {
  height:100%; background:var(--sage-dk); border-radius:2px;
  transition:width 0.5s cubic-bezier(0.4,0,0.2,1); width:0%;
}

/* ── CARD ── */
.card {
  background:var(--pearl); border-radius:8px;
  width:100%; max-width:640px;
  padding:34px 40px 30px;
  box-shadow:0 8px 36px rgba(42,42,42,0.09);
  position:relative; overflow:hidden;
  animation:slideIn 0.32s cubic-bezier(0.4,0,0.2,1);
}
.card::before {
  content:''; position:absolute; left:0; top:0;
  width:4px; height:100%; background:var(--sage-dk);
}
@keyframes slideIn {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── QUESTION ── */
.q-eyebrow {
  font-size:9.5px; letter-spacing:3px; text-transform:uppercase;
  color:var(--sage-dk); font-weight:700; margin-bottom:9px;
}
.q-text {
  font-family:'Georgia',serif;
  font-size:23px; font-weight:600; color:var(--coal);
  line-height:1.22; margin-bottom:7px;
}
.q-sub {
  font-size:12px; color:var(--mist); line-height:1.65;
  margin-bottom:22px; font-weight:300;
}

/* ── CONCEPT BLOCK ── */
.concept-block {
  background:var(--warm);
  border-left:3px solid var(--sage-dk);
  border-radius:0 6px 6px 0;
  padding:16px 20px; margin-bottom:22px;
}
.concept-name {
  font-size:12px; font-weight:700; color:var(--coal); margin-bottom:8px;
  letter-spacing:0.3px;
}
.concept-step {
  font-size:12px; color:#555; line-height:1.7;
  padding-left:14px; position:relative; margin-bottom:2px;
}
.concept-step::before {
  content:'→'; position:absolute; left:0;
  color:var(--sage-dk); font-weight:700; font-size:11px;
}

/* ── PROPOSITION CARDS ── */
.props { display:flex; flex-direction:column; gap:12px; margin-bottom:4px; }
.prop {
  border-radius:7px; padding:18px 20px;
  border:1.5px solid var(--sage-lt);
  cursor:pointer; transition:all 0.18s; position:relative;
  background:var(--cream);
}
.prop:hover { border-color:var(--sage-dk); background:rgba(74,112,80,0.04); }
.prop.selected {
  border-color:var(--sage-dk);
  background:rgba(74,112,80,0.06);
  box-shadow:0 0 0 2.5px rgba(74,112,80,0.12);
}
.prop.selected::after {
  content:'✓ Selected';
  position:absolute; top:14px; right:16px;
  font-size:9.5px; font-weight:700; letter-spacing:1.5px;
  color:var(--sage-dk); text-transform:uppercase;
}
.prop-b { border-color:#E5C9AB; background:#FEF9F5; }
.prop-b:hover { border-color:var(--terr); background:rgba(196,120,74,0.04); }
.prop-b.selected {
  border-color:var(--terr);
  background:rgba(196,120,74,0.05);
  box-shadow:0 0 0 2.5px rgba(196,120,74,0.12);
}
.prop-b.selected::after { color:var(--terr); }

.prop-badge {
  font-size:9px; font-weight:700; letter-spacing:2px;
  text-transform:uppercase; margin-bottom:7px; display:block;
}
.prop-badge.a { color:var(--sage-dk); }
.prop-badge.b { color:var(--terr); }
.prop-title { font-size:14px; font-weight:700; color:var(--coal); margin-bottom:6px; }
.prop-desc { font-size:12px; color:#555; line-height:1.6; }
.prop-note {
  margin-top:9px; font-size:11px; font-weight:600;
  padding-top:8px; border-top:1px solid rgba(0,0,0,0.06);
}
.prop-note.a { color:var(--sage-dk); }
.prop-note.b { color:var(--terr); }

.prop-insight {
  font-size:11.5px; color:var(--sage-dk); font-style:italic;
  background:rgba(74,112,80,0.07);
  border-left:2px solid var(--sage-dk);
  border-radius:0 4px 4px 0;
  padding:9px 14px; margin-top:12px; line-height:1.55;
}

/* ── STANDARD OPTIONS ── */
.options { display:flex; flex-direction:column; gap:9px; }
.option {
  display:flex; align-items:center; gap:13px;
  padding:12px 16px;
  background:var(--cream); border:1.5px solid transparent;
  border-radius:6px; cursor:pointer;
  transition:all 0.16s;
  font-size:13px; color:var(--coal); font-weight:400;
  user-select:none; position:relative;
}
.option:hover { border-color:var(--sage-lt); background:var(--warm); }
.option.selected {
  border-color:var(--sage-dk);
  background:rgba(74,112,80,0.06);
  color:var(--sage-dk); font-weight:600;
}
.option.selected::after {
  content:'✓'; position:absolute; right:15px;
  font-size:12px; color:var(--sage-dk);
}
.opt-dot {
  width:17px; height:17px; border-radius:50%;
  border:1.5px solid var(--sage-lt);
  flex-shrink:0; background:white; transition:all 0.16s;
}
.option.selected .opt-dot { background:var(--sage-dk); border-color:var(--sage-dk); }

/* ── WTP NOTE ── */
.wtp-note {
  margin-bottom:20px;
  font-size:11.5px; color:var(--mist);
  background:rgba(74,112,80,0.06);
  border-radius:4px; padding:9px 14px; line-height:1.55;
  font-style:italic;
}

/* ── SCALE ── */
.scale-row { display:flex; gap:8px; }
.scale-btn {
  flex:1; height:46px;
  border:1.5px solid var(--sage-lt); border-radius:5px;
  background:var(--cream); cursor:pointer;
  font-size:14px; font-weight:600; color:var(--coal);
  transition:all 0.14s;
  font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
  display:flex; align-items:center; justify-content:center;
}
.scale-btn:hover { background:var(--warm); border-color:var(--sage-dk); }
.scale-btn.selected { background:var(--sage-dk); border-color:var(--sage-dk); color:white; }
.scale-labels {
  display:flex; justify-content:space-between;
  font-size:10px; color:var(--mist); margin-top:7px; padding:0 2px;
}

/* ── NAV ── */
.nav { display:flex; justify-content:space-between; align-items:center; margin-top:26px; }
.btn-next {
  background:var(--sage-dk); color:white; border:none;
  border-radius:5px; padding:12px 30px;
  font-size:12.5px; font-weight:600; letter-spacing:1px;
  text-transform:uppercase; cursor:pointer;
  transition:all 0.16s; font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
}
.btn-next:hover { background:#3a5a40; transform:translateY(-1px); }
.btn-next:disabled { background:var(--sage-lt); cursor:not-allowed; transform:none; }
.btn-back {
  background:none; border:none; color:var(--mist);
  font-size:12px; cursor:pointer; font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
  font-weight:500;
}
.btn-back:hover { color:var(--coal); }

/* ── THANK YOU ── */
.ty { text-align:center; padding:36px 16px 20px; }
.ty-icon { font-size:46px; display:block; margin-bottom:14px; }
.ty-head {
  font-family:'Georgia',serif;
  font-size:30px; font-weight:600; color:var(--coal); margin-bottom:10px;
}
.ty-sub {
  font-size:13.5px; color:var(--mist); line-height:1.7;
  max-width:400px; margin:0 auto 26px;
}
.summary { text-align:left; margin-bottom:20px; }
.sum-row {
  display:flex; justify-content:space-between; align-items:baseline;
  padding:8px 0; border-bottom:1px solid var(--sage-lt); gap:16px;
  font-size:12px;
}
.sum-row:last-child { border:none; }
.sum-lbl { color:var(--mist); flex-shrink:0; }
.sum-val { color:var(--coal); font-weight:600; text-align:right; }
.ty-share {
  font-size:12px; font-weight:600; color:var(--sage-dk);
  letter-spacing:1px; margin-top:6px;
}
</style>
<script src="https://forminit.com/sdk/v1/forminit.js"></script>
</head>
<body>

<div class="brand">Pod<em>Clean</em></div>
<div class="survey-meta">Parent Concept Survey &nbsp;·&nbsp; ~90 seconds</div>

<div class="progress-wrap">
  <div class="progress-label">
    <span id="prog-label">Question 1 of 11</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
</div>

<div id="card" class="card"></div>

<script>
// ── GOOGLE SHEETS ENDPOINT ──────────────────────────────────────────────────
// Replace this placeholder with your deployed Apps Script Web App URL.
// See PodClean_Survey_AppScript.gs for setup instructions.
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzLPmIU0WReTq6xUtrT_MFXE1YLpb9R-_tTUkp3lNk2WDcTpPJEFtVzbxltnp9OufNh/exec';

// Sends all answers to Google Sheets via no-cors POST with text/plain
// text/plain skips the CORS preflight — this is the correct GAS method
const FORMINIT_ID = '0s64j60hjbh';

const Q_LABELS = {
  q1:  'Q1 — Child age',
  q2:  'Q2 — Blowout frequency',
  q3:  'Q3 — Blowout pain score (1-5)',
  q4:  'Q4 — Current blowout approach',
  q5: 'Q5 — Weaning stain frequency',
  q6: 'Q6 — Current stain approach',
  q7: 'Q7 — Stain spray satisfaction (1-5)',
  q8:  'Q8 — Reaction to concept',
  q9:  'Q9 — Preferred proposition (A or B)',
  q10:  'Q10 — Expected price',
  q11:  'Q11 — Likelihood to recommend (1-5)',
  q6_exit: 'Why not for them (open text)',
  path: 'Survey path'
};

async function submitToSheet(payload) {
  try {
    const formData = new FormData();
    Object.keys(payload).forEach(key => {
      const label = Q_LABELS[key] || key;
      formData.append('fi-text-' + label.replace(/[^a-zA-Z0-9]/g, '-'), payload[key] !== undefined ? String(payload[key]) : '');
    });
    const _forminit = new Forminit();
    const { data, error } = await _forminit.submit(FORMINIT_ID, formData);
    if (error) {
      console.warn('Forminit error:', error.message);
    } else {
      console.log('Submitted to Forminit successfully:', data);
    }
  } catch (e) {
    console.warn('Submission failed:', e);
  }
}

// ── ANSWER STORE ─────────────────────────────────────────────────────────────
const A = {}; // answers

const Qs = [

  /* Q1 — screener */
  { id:'q1', n:1,
    text:'How old is your youngest child?',
    sub:'Helps us understand who we\'re designing for.',
    type:'single',
    opts:['Expecting or newborn (0–3 months)','3–12 months','1–2 years','2+ years or no children yet']
  },

  /* Q2 — problem frequency */
  { id:'q2', n:2,
    text:'How often does your baby have a blowout that soils their clothing?',
    sub:'A blowout = when a nappy leaks and waste reaches the garment.',
    type:'single',
    opts:['Multiple times a week','About once a week','A few times a month','Rarely or never']
  },

  /* Q3 — pain scale */
  { id:'q3', n:3,
    text:'How much does cleaning soiled baby clothes bother you?',
    sub:'1 = doesn\'t bother me at all &nbsp;&nbsp; 5 = it\'s genuinely awful',
    type:'scale'
  },

  /* Q4 — current behaviour */
  { id:'q4', n:4,
    text:'What do you currently do first when a garment is badly soiled?',
    sub:'Pick whichever best describes your usual approach.',
    type:'single',
    opts:['Rinse by hand in the bathroom sink','Rinse in the toilet or shower','Straight into the washing machine','Soak it and deal with it later','Bin it — it\'s not worth the effort']
  },


  /* Q4b — weaning stain frequency */
  { id:'q5', n:5,
    text:'How often do your baby\'s clothes get food stains you struggle to remove?',
    sub:'Think carrot, tomato, berry, avocado, sweet potato — the ones that survive the washing machine.',
    type:'single',
    opts:['Every day — it\'s constant once they started solids','A few times a week','About once a week','Occasionally — not a major issue','My baby isn\'t weaning yet']
  },

  /* Q4c — current stain removal behaviour */
  { id:'q6', n:6,
    text:'What do you currently do with clothes that have stubborn food stains?',
    sub:'Pick whichever best describes your usual approach.',
    type:'single',
    opts:['Spray and soak before washing (Dreft, Shout, OxiClean etc)','Scrub by hand and hope for the best','Straight in the washing machine — sometimes it works','Sun-dry to fade the stain','Accept the stain — it stays','Bin the garment or put it in the rag pile']
  },

  /* Q4d — satisfaction with sprays */
  { id:'q7', n:7,
    text:'How satisfied are you with stain sprays and your current approach to food stains?',
    sub:'1 = completely useless &nbsp;&nbsp; 5 = they work fine for me',
    type:'scale'
  },

  /* Q5 — concept reveal + first reaction */
  { id:'q8', n:8,
    text:'We\'re building a product for this exact problem. Here\'s what it does:',
    sub:'Please read, then give us your honest first reaction.',
    type:'single', concept:true,
    opts:[
      '😍  Solves a real problem — I want this',
      '🤔  Interesting — I\'d want to know more first',
      '😐  I can see the appeal but it\'s not for me',
      '👎  I wouldn\'t use this'
    ]
  },

  /* Q6 — proposition A vs B (key product decision) */
  { id:'q9', n:9,
    text:'Which version would be more valuable to you?',
    sub:'Both use the same enzyme technology. The difference is what happens at the end of the cycle.',
    type:'prop'
  },

  /* Q7 — WTP ranges — options set dynamically from Q6 answer at render time */
  { id:'q10', n:10,
    text:'What would you expect to pay for the pod unit?',
    sub:'Think of countertop baby appliances you\'ve bought before — sterilisers, warmers, bottle makers. Pick the range that feels right.',
    type:'single', wtp:true
    /* opts injected dynamically in render() based on A.q9 */
  },

  /* Q9 — word-of-mouth proxy */
  { id:'q11', n:11,
    text:'If this product worked exactly as described, how likely are you to tell another parent about it?',
    sub:'1 = definitely not &nbsp;&nbsp; 5 = I\'d tell everyone I know',
    type:'scale'
  }
];

const TOTAL = Qs.length;
let cur = 0;

function render() {
  const q = Qs[cur];
  const pct = Math.round((cur / TOTAL) * 100);
  document.getElementById('prog-label').textContent = `Question ${q.n} of ${TOTAL}`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('fill').style.width = pct + '%';

  // Force re-animation
  const card = document.getElementById('card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';

  let h = `<div class="q-eyebrow">Question ${q.n} of ${TOTAL}</div>`;
  h += `<div class="q-text">${q.text}</div>`;
  if (q.sub) h += `<div class="q-sub">${q.sub}</div>`;

  /* ── CONCEPT BLOCK ── */
  if (q.concept) {
    h += `
      <div class="concept-block">
        <div class="concept-name">🧪 An enzyme pod that removes waste from soiled baby clothes — hands-free</div>
        <div style="font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#4A7050;margin:8px 0 4px">Two tablet formulas — one pod</div>
        <div style="font-size:12px;color:#555;line-height:1.6;margin-bottom:10px">
          <strong>Tablet A — Blowout Formula (0–6 months):</strong> 4 enzymes that dissolve fecal matter, proteins and fats.<br>
          <strong>Tablet B — Weaning Formula (6–18 months):</strong> adds a 5th enzyme (pectinase) that lifts food stains — carrot, tomato, berry, avocado. Subscription auto-switches as your baby grows.
        </div>
        <div class="concept-step">Drop soiled garment into the pod chamber.</div>
        <div class="concept-step">Add one enzyme tablet. Close the lid. Press start.</div>
        <div class="concept-step">The pod runs a 10-minute enzyme cycle at 40°C — dissolving fecal matter, fats and starch-based solids.</div>
        <div class="concept-step">No scrubbing. No sink contact. Clean hands throughout.</div>
      </div>`;
  }

  /* ── PROPOSITION A vs B ── */
  if (q.type === 'prop') {
    const selA = A[q.id] === 'A';
    const selB = A[q.id] === 'B';
    h += `<div class="props">`;
    h += `
      <div class="prop ${selA ? 'selected' : ''}" onclick="pick('${q.id}','A')">
        <span class="prop-badge a">Option A — Pre-cleaner</span>
        <div class="prop-title">Pod removes the waste. You still machine-wash afterwards.</div>
        <div class="prop-desc">
          After the 10-minute enzyme cycle, waste is dissolved and the garment is free of solid matter.
          You then spray any remaining stain and put the item in your normal washing machine with everything else.
          The pod handles the part nobody wants to do. Laundry still happens as normal.
        </div>
        <div class="prop-note a">Simpler device · lower price · uses your existing washing machine</div>
      </div>
      <div class="prop prop-b ${selB ? 'selected' : ''}" onclick="pick('${q.id}','B')">
        <span class="prop-badge b">Option B — Full wash</span>
        <div class="prop-title">Pod removes the waste AND completes a full wash. No machine needed.</div>
        <div class="prop-desc">
          After the enzyme cycle, the pod runs a full rinse-and-wash cycle inside the unit itself.
          The garment comes out clean and ready to dry — you never put it in a washing machine at all.
          The entire task is handled in one device, start to finish.
        </div>
        <div class="prop-note b">Larger device · higher price · fully self-contained — nothing else required</div>
      </div>
    </div>`;
    if (A[q.id]) {
      h += `<div class="prop-insight">Your answer here is one of the most important signals we'll collect. It directly determines which product we build. Thank you.</div>`;
    }
  }

  /* ── WTP NOTE + DYNAMIC OPTS INJECTION ── */
  if (q.wtp) {
    // Inject the right price options based on what proposition the respondent chose
    const choseB = A.q9 === 'B';
    q.opts = choseB
      ? [
          '$130 – $149',
          '$150 – $169',
          '$170 – $189',
          '$190 – $199',
          'Over $200 — if it truly handles everything'
        ]
      : [
          'Under $50',
          '$50 – $79',
          '$80 – $109',
          '$110 – $129',
          'Over $130 — if it genuinely works'
        ];

    const wtpContext = choseB
      ? 'You chose the full-wash version — a more capable device that does everything in one step. These ranges reflect that.'
      : 'You chose the pre-cleaner version — a simpler countertop device. These ranges reflect that.';

    h += `<div class="wtp-note">
      We haven't told you our price yet — that's intentional. We want your honest expectation first, before we anchor you to a number.<br><br>
      <strong style="color:var(--sage-dk);">${wtpContext}</strong>
    </div>`;

    // Reset answer if proposition changed and old answer index is now out of range
    if (A[q.id] !== undefined && A[q.id] >= q.opts.length) {
      delete A[q.id];
    }
  }

  /* ── SINGLE OPTIONS ── */
  if (q.type === 'single') {
    h += `<div class="options">`;
    q.opts.forEach((o, i) => {
      const sel = A[q.id] === i ? 'selected' : '';
      h += `<div class="option ${sel}" onclick="pick('${q.id}',${i})"><div class="opt-dot"></div><span>${o}</span></div>`;
    });
    h += `</div>`;
  }

  /* ── SCALE ── */
  if (q.type === 'scale') {
    h += `<div class="scale-row">`;
    for (let v = 1; v <= 5; v++) {
      const sel = A[q.id] === v ? 'selected' : '';
      h += `<button class="scale-btn ${sel}" onclick="pick('${q.id}',${v})">${v}</button>`;
    }
    h += `</div><div class="scale-labels"><span>Not at all</span><span>Absolutely</span></div>`;
  }

  /* ── NAV ── */
  const hasAnswer = A[q.id] !== undefined;
  const isLast = cur === TOTAL - 1;
  h += `
    <div class="nav">
      ${cur > 0 ? `<button class="btn-back" onclick="back()">← Back</button>` : `<span></span>`}
      <button class="btn-next" ${hasAnswer ? '' : 'disabled'} onclick="next()">
        ${isLast ? 'Submit →' : 'Next →'}
      </button>
    </div>`;

  card.innerHTML = h;
}

function pick(id, val) { A[id] = val; render(); }

function isNegQ5() {
  // index 2 = "not for me"  |  index 3 = "wouldn't use"
  return Qs[cur].id === 'q8' && (A.q8 === 2 || A.q8 === 3);
}

function next() {
  if (A[Qs[cur].id] === undefined) return;
  if (isNegQ5()) { renderExit(); return; }
  cur < TOTAL - 1 ? (cur++, render()) : done();
}

function back() {
  if (document.getElementById('exit-q')) {
    cur = Qs.findIndex(q => q.id === 'q8');
    render();
    return;
  }
  if (cur > 0) { cur--; render(); }
}

function renderExit() {
  const pct = 72;
  document.getElementById('prog-label').textContent = 'One last question';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('fill').style.width = pct + '%';

  const lead = A.q8 === 2
    ? "You mentioned this isn't quite for you."
    : "You mentioned you wouldn't use this.";

  const card = document.getElementById('card');
  card.style.animation = 'none'; card.offsetHeight; card.style.animation = '';

  card.innerHTML = `
    <div id="exit-q">
      <div class="q-eyebrow">One last question</div>
      <div class="q-text">Can you tell us briefly why?</div>
      <div class="q-sub">${lead} Your honest reason is the most valuable thing you can share — it will directly shape what we change.</div>
      <textarea id="exit-txt"
        placeholder="e.g. I already have a system that works / the price feels too high / I prefer just using the washing machine..."
        oninput="document.getElementById('btn-exit').disabled = this.value.trim().length < 3;"
        style="width:100%;min-height:110px;border:1.5px solid var(--sage-lt);border-radius:6px;padding:14px 16px;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;font-size:13px;color:var(--coal);background:var(--cream);resize:vertical;outline:none;line-height:1.6;margin-bottom:6px;transition:border-color 0.16s;"
        onfocus="this.style.borderColor='var(--sage-dk)'"
        onblur="this.style.borderColor='var(--sage-lt)'"
      ></textarea>
      <div style="font-size:10.5px;color:var(--mist);margin-bottom:22px;">No minimum — a single sentence is plenty.</div>
      <div class="nav">
        <button class="btn-back" onclick="back()">← Back</button>
        <button id="btn-exit" class="btn-next" disabled onclick="submitExit()">Submit \u2192</button>
      </div>
    </div>`;
}

function submitExit() {
  A.q9_exit = document.getElementById('exit-txt').value.trim();
  doneEarly();
}

function doneEarly() {
  // Capture and submit before rendering thank-you
  A.q9_exit = (document.getElementById('exit-txt') || {}).value?.trim() || A.q9_exit || '';
  submitToSheet({
    q1: A.q1, q2: A.q2, q3: A.q3, q4: A.q4,
    q5: A.q5||'', q6: A.q6||'', q7: A.q7||'',
    q8: A.q8||'', q9: A.q9||'', q10: A.q10||'', q11: A.q11||'',
    q6_exit: A.q9_exit||'',
    path: 'early_exit'
  });
  document.getElementById('fill').style.width = '100%';
  document.getElementById('prog-label').textContent = 'Complete';
  document.getElementById('prog-pct').textContent = '100%';

  const q5l = ['Wants it — real problem ✓','Interested, wants more info','Can see appeal, not for them','Would not use'];

  document.getElementById('card').innerHTML = `
    <div class="ty">
      <span class="ty-icon">🌿</span>
      <div class="ty-head">Thank you — genuinely.</div>
      <div class="ty-sub">Honest negative feedback is just as valuable as enthusiasm. It will directly shape what we change or rethink.</div>
      <div class="summary">
        <div class="sum-row"><span class="sum-lbl">Q1 — Child age</span><span class="sum-val">${['Expecting / newborn','3–12 months','1–2 years','2+ years / no children'][A.q1] ?? '—'}</span></div>
        <div class="sum-row"><span class="sum-lbl">Q2 — Blowout frequency</span><span class="sum-val">${['Multiple times a week','~Once a week','A few times a month','Rarely or never'][A.q2] ?? '—'}</span></div>
        <div class="sum-row"><span class="sum-lbl">Q3 — How much it bothers you</span><span class="sum-val">${A.q3 ?? '—'} / 5</span></div>
        <div class="sum-row"><span class="sum-lbl">Q4 — Current blowout approach</span><span class="sum-val">${['Hand-rinse in sink','Toilet / shower rinse','Straight to machine','Soak it','Bin it'][A.q4] ?? '—'}</span></div>
        <div class="sum-row"><span class="sum-lbl">Q5 — Weaning stain frequency</span><span class="sum-val">${['Every day','A few times a week','~Once a week','Occasionally','Not weaning yet'][A.q5] ?? '—'}</span></div>
        <div class="sum-row"><span class="sum-lbl">Q6 — Current stain approach</span><span class="sum-val">${['Spray & soak','Scrub by hand','Straight to machine','Sun-dry','Accept the stain','Bin it'][A.q6] ?? '—'}</span></div>
        <div class="sum-row"><span class="sum-lbl">Q7 — Stain spray satisfaction</span><span class="sum-val">${A.q7 ?? '—'} / 5</span></div>
        <div class="sum-row"><span class="sum-lbl">Q8 — Reaction to concept</span><span class="sum-val">${q5l[A.q8] ?? '—'}</span></div>
        <div class="sum-row"><span class="sum-lbl">Why not for you</span><span class="sum-val" style="font-style:italic;color:var(--sage-dk);">"${A.q9_exit ?? '—'}"</span></div>
      </div>
      <div class="ty-share">Know a parent who might find this useful? Share this survey with them ↗</div>
    </div>`;
}

function done() {
  // Capture and submit before rendering thank-you
  submitToSheet({
    q1: A.q1, q2: A.q2, q3: A.q3, q4: A.q4,
    q5: A.q5||'', q6: A.q6||'', q7: A.q7||'',
    q8: A.q8, q9: A.q9, q10: A.q10, q11: A.q11,
    q6_exit: '',
    path: 'full'
  });
  document.getElementById('fill').style.width = '100%';
  document.getElementById('prog-label').textContent = 'Complete';
  document.getElementById('prog-pct').textContent = '100%';

  const L = {
    q1: ['Expecting / newborn','3–12 months','1–2 years','2+ years / no children'],
    q2: ['Multiple times a week','~Once a week','A few times a month','Rarely or never'],
    q4: ['Hand-rinse in sink','Toilet / shower rinse','Straight to machine','Soak it','Bin it'],
    q5: ['Daily','Few times/week','~Once/week','Occasionally','Not weaning yet'],
    q6: ['Spray & soak','Scrub by hand','Straight to machine','Sun-dry','Accept it','Bin it'],
    q7: ['1','2','3','4','5'],
    q8: ['Wants it — real problem ✓','Interested, wants more info','Sees appeal, not for them','Would not use'],
    q9: { A:'Option A — Pre-cleaner (machine-wash after)', B:'Option B — Full wash (no machine needed)' },
    q10: A.q9 === 'B'
      ? ['$130–$149','$150–$169','$170–$189','$190–$199','Over $200']
      : ['Under $50','$50–$79','$80–$109','$110–$129','Over $130'],
    q8: ['Parent reviews','Doctor endorsement','60-day refund','Video demo','FDA GRAS certification']
  };

  document.getElementById('card').innerHTML = `
    <div class="ty">
      <span class="ty-icon">🌿</span>
      <div class="ty-head">Thank you — genuinely.</div>
      <div class="ty-sub">Your responses will directly shape what we build. Here's a summary of what you told us.</div>
      <div class="summary">
        <div class="sum-row"><span class="sum-lbl">Q1 — Child age</span><span class="sum-val">${L.q1[A.q1] ?? '—'}</span></div>
        <div class="sum-row"><span class="sum-lbl">Q2 — Blowout frequency</span><span class="sum-val">${L.q2[A.q2] ?? '—'}</span></div>
        <div class="sum-row"><span class="sum-lbl">Q3 — How much it bothers you</span><span class="sum-val">${A.q3 ?? '—'} / 5</span></div>
        <div class="sum-row"><span class="sum-lbl">Q4 — Current blowout approach</span><span class="sum-val">${L.q4[A.q4] ?? '—'}</span></div>
        <div class="sum-row"><span class="sum-lbl">Q5 — Weaning stain frequency</span><span class="sum-val">${L.q5[A.q5] ?? '—'}</span></div>
        <div class="sum-row"><span class="sum-lbl">Q6 — Current stain approach</span><span class="sum-val">${L.q6[A.q6] ?? '—'}</span></div>
        <div class="sum-row"><span class="sum-lbl">Q7 — Stain spray satisfaction</span><span class="sum-val">${A.q7 ?? '—'} / 5</span></div>
        <div class="sum-row"><span class="sum-lbl">Q8 — Reaction to concept</span><span class="sum-val">${L.q5[A.q8] ?? '—'}</span></div>
        <div class="sum-row"><span class="sum-lbl">Q9 — Preferred proposition</span><span class="sum-val">${L.q6[A.q9] ?? '—'}</span></div>
        <div class="sum-row"><span class="sum-lbl">Q10 — Expected price</span><span class="sum-val">${L.q7[A.q10] ?? '—'}</span></div>
        <div class="sum-row"><span class="sum-lbl">Q11 — Likelihood to recommend</span><span class="sum-val">${A.q11 ?? '—'} / 5</span></div>
      </div>
      <div class="ty-share">Know a parent who'd find this useful? Share this survey with them ↗</div>
    </div>`;
}

render();
</script>
</body>
</html>
